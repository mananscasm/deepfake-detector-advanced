<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Deepfake Detector</title>
  <style>
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: white;
      padding: 16px;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 10px 0;
      text-align: center;
    }
    .status {
      text-align: center;
      padding: 15px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      margin-bottom: 15px;
    }
    .confidence {
      font-size: 42px;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 5px 0;
    }
    .verdict {
      font-size: 14px;
      margin-top: 8px;
    }
    .status-text {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 8px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-1px);
    }
    .footer {
      font-size: 10px;
      text-align: center;
      margin-top: 15px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <h1>🎭 Deepfake Detector</h1>
  <div class="status">
    <div>Real-time Analysis</div>
    <div class="confidence" id="confidence">--%</div>
    <div class="verdict" id="verdict">Analyzing...</div>
    <div class="status-text" id="status">Loading...</div>
  </div>
  <button id="reportBtn">📋 Report as Deepfake</button>
  <button id="refreshBtn">🔄 Refresh Analysis</button>
  <div class="footer">Privacy-first • Local processing • Real-time</div>
  <script src="popup.js"></script>
</body>
</html>
